<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OpenRouter Text Processor</title>
<style>
:root {
  --bg-primary: #0a0a1a;
  --bg-secondary: #12122a;
  --bg-tertiary: #1a1a3a;
  --bg-input: #0e0e24;
  --border: #2a2a5a;
  --border-focus: #00e5ff;
  --text-primary: #e0e0ff;
  --text-secondary: #8888aa;
  --text-dim: #5555777;
  --accent-cyan: #00e5ff;
  --accent-magenta: #ff00ff;
  --accent-green: #00ff88;
  --accent-red: #ff3366;
  --accent-yellow: #ffaa00;
  --font-mono: 'Share Tech Mono', 'Fira Code', 'Consolas', monospace;
  --font-ui: 'Orbitron', 'Share Tech Mono', sans-serif;
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  background: var(--bg-primary);
  color: var(--text-primary);
  font-family: var(--font-mono);
  font-size: 13px;
  line-height: 1.5;
  overflow-x: hidden;
}

/* ---------- TOOLBAR ---------- */
.toolbar {
  background: var(--bg-secondary);
  border-bottom: 1px solid var(--border);
  padding: 10px 16px;
  display: flex;
  flex-wrap: wrap;
  gap: 12px;
  align-items: center;
}

.toolbar-group {
  display: flex;
  align-items: center;
  gap: 6px;
}

.toolbar label {
  color: var(--text-secondary);
  font-size: 11px;
  text-transform: uppercase;
  letter-spacing: 1px;
}

.toolbar select,
.toolbar input[type="number"],
.toolbar input[type="text"] {
  background: var(--bg-input);
  border: 1px solid var(--border);
  color: var(--text-primary);
  font-family: var(--font-mono);
  font-size: 12px;
  padding: 5px 8px;
  border-radius: 3px;
}

.toolbar select:focus,
.toolbar input:focus {
  border-color: var(--accent-cyan);
  outline: none;
  box-shadow: 0 0 6px rgba(0, 229, 255, 0.3);
}

.toolbar select { min-width: 280px; }
.toolbar input[type="number"] { width: 70px; }

/* Model search wrapper */
.model-search-wrap {
  position: relative;
}
.model-search-wrap input[type="text"] {
  min-width: 280px;
}
.model-dropdown {
  position: absolute;
  top: 100%;
  left: 0;
  right: 0;
  max-height: 300px;
  overflow-y: auto;
  background: var(--bg-tertiary);
  border: 1px solid var(--border);
  border-top: none;
  z-index: 100;
  display: none;
}
.model-dropdown.open { display: block; }
.model-option {
  padding: 6px 10px;
  cursor: pointer;
  display: flex;
  justify-content: space-between;
  font-size: 12px;
}
.model-option:hover, .model-option.selected {
  background: rgba(0, 229, 255, 0.15);
}
.model-option .model-meta {
  color: var(--text-secondary);
  font-size: 10px;
}

/* Mode toggle */
.mode-toggle {
  display: flex;
  border: 1px solid var(--border);
  border-radius: 3px;
  overflow: hidden;
}
.mode-toggle button {
  background: var(--bg-input);
  border: none;
  color: var(--text-secondary);
  font-family: var(--font-mono);
  font-size: 11px;
  padding: 5px 14px;
  cursor: pointer;
  transition: all 0.2s;
}
.mode-toggle button.active {
  background: var(--accent-cyan);
  color: var(--bg-primary);
}

/* System prompt toggle */
.sys-prompt-toggle {
  color: var(--accent-cyan);
  cursor: pointer;
  font-size: 11px;
  text-decoration: underline;
  user-select: none;
}

.sys-prompt-panel {
  display: none;
  width: 100%;
  padding: 8px 16px;
  background: var(--bg-secondary);
  border-bottom: 1px solid var(--border);
}
.sys-prompt-panel.open { display: block; }
.sys-prompt-panel textarea {
  width: 100%;
  height: 80px;
  background: var(--bg-input);
  border: 1px solid var(--border);
  color: var(--text-primary);
  font-family: var(--font-mono);
  font-size: 12px;
  padding: 8px;
  resize: vertical;
  border-radius: 3px;
}
.sys-prompt-panel textarea:focus {
  border-color: var(--accent-cyan);
  outline: none;
}

/* ---------- PANELS ---------- */
.panels {
  display: flex;
  gap: 0;
  height: calc(50vh - 60px);
  min-height: 200px;
}

.panel {
  flex: 1;
  display: flex;
  flex-direction: column;
  border-right: 1px solid var(--border);
}
.panel:last-child { border-right: none; }

.panel-header {
  background: var(--bg-secondary);
  padding: 8px 12px;
  border-bottom: 1px solid var(--border);
  display: flex;
  justify-content: space-between;
  align-items: center;
}
.panel-title {
  font-size: 11px;
  text-transform: uppercase;
  letter-spacing: 1.5px;
  color: var(--accent-cyan);
}
.panel-meta {
  font-size: 10px;
  color: var(--text-secondary);
}

.panel textarea {
  flex: 1;
  background: var(--bg-input);
  border: none;
  color: var(--text-primary);
  font-family: var(--font-mono);
  font-size: 13px;
  line-height: 1.6;
  padding: 12px;
  resize: none;
}
.panel textarea:focus {
  outline: none;
  box-shadow: inset 0 0 12px rgba(0, 229, 255, 0.08);
}
.panel textarea.locked {
  opacity: 0.5;
  pointer-events: none;
}
.panel textarea::placeholder { color: var(--text-secondary); }

.panel-footer {
  background: var(--bg-secondary);
  padding: 6px 12px;
  border-top: 1px solid var(--border);
  display: flex;
  justify-content: space-between;
  align-items: center;
}

/* Buttons */
.btn {
  background: var(--bg-tertiary);
  border: 1px solid var(--border);
  color: var(--text-primary);
  font-family: var(--font-mono);
  font-size: 11px;
  padding: 6px 14px;
  border-radius: 3px;
  cursor: pointer;
  transition: all 0.2s;
}
.btn:hover {
  border-color: var(--accent-cyan);
  box-shadow: 0 0 8px rgba(0, 229, 255, 0.2);
}
.btn-primary {
  background: var(--accent-cyan);
  color: var(--bg-primary);
  border-color: var(--accent-cyan);
  font-weight: bold;
}
.btn-primary:hover {
  box-shadow: 0 0 16px rgba(0, 229, 255, 0.5);
}
.btn-primary:disabled {
  opacity: 0.4;
  cursor: not-allowed;
  box-shadow: none;
}
.btn-small {
  padding: 3px 8px;
  font-size: 10px;
}

/* ---------- OUTPUT ---------- */
.output-section {
  flex: 1;
  display: flex;
  flex-direction: column;
  border-top: 1px solid var(--border);
  min-height: 200px;
}

.output-header {
  background: var(--bg-secondary);
  padding: 8px 12px;
  border-bottom: 1px solid var(--border);
  display: flex;
  justify-content: space-between;
  align-items: center;
}
.output-title {
  font-size: 11px;
  text-transform: uppercase;
  letter-spacing: 1.5px;
  color: var(--accent-magenta);
}

.output-body {
  flex: 1;
  overflow-y: auto;
  padding: 16px;
  background: var(--bg-primary);
}

/* Single-shot result */
.result-text {
  white-space: pre-wrap;
  word-wrap: break-word;
  line-height: 1.7;
}
.result-text h1, .result-text h2, .result-text h3 {
  color: var(--accent-cyan);
  margin: 12px 0 6px;
}
.result-text code {
  background: var(--bg-tertiary);
  padding: 2px 5px;
  border-radius: 3px;
  font-size: 12px;
}
.result-text pre {
  background: var(--bg-tertiary);
  padding: 10px;
  border-radius: 4px;
  overflow-x: auto;
  margin: 8px 0;
}
.result-text strong { color: var(--accent-cyan); }
.result-text em { color: var(--accent-green); }

/* Conversation thread */
.conversation-thread {
  display: flex;
  flex-direction: column;
  gap: 12px;
}
.msg {
  padding: 10px 14px;
  border-radius: 6px;
  max-width: 90%;
  position: relative;
}
.msg-user {
  background: rgba(0, 229, 255, 0.1);
  border: 1px solid rgba(0, 229, 255, 0.25);
  align-self: flex-end;
}
.msg-assistant {
  background: rgba(255, 0, 255, 0.08);
  border: 1px solid rgba(255, 0, 255, 0.2);
  align-self: flex-start;
}
.msg-role {
  font-size: 10px;
  text-transform: uppercase;
  letter-spacing: 1px;
  margin-bottom: 4px;
}
.msg-user .msg-role { color: var(--accent-cyan); }
.msg-assistant .msg-role { color: var(--accent-magenta); }
.msg-content {
  white-space: pre-wrap;
  word-wrap: break-word;
  line-height: 1.6;
}
.msg-copy {
  position: absolute;
  top: 6px;
  right: 6px;
  opacity: 0.3;
}
.msg:hover .msg-copy { opacity: 1; }

/* Usage bar */
.usage-bar {
  background: var(--bg-secondary);
  border-top: 1px solid var(--border);
  padding: 6px 12px;
  font-size: 10px;
  color: var(--text-secondary);
  display: flex;
  gap: 16px;
}
.usage-bar span { color: var(--text-primary); }

/* Status / loading */
.status-bar {
  display: flex;
  align-items: center;
  gap: 8px;
}
.spinner {
  width: 14px;
  height: 14px;
  border: 2px solid var(--border);
  border-top-color: var(--accent-cyan);
  border-radius: 50%;
  animation: spin 0.8s linear infinite;
  display: none;
}
.spinner.active { display: inline-block; }
@keyframes spin { to { transform: rotate(360deg); } }

.elapsed {
  font-size: 10px;
  color: var(--text-secondary);
  display: none;
}
.elapsed.active { display: inline; }

/* Placeholder */
.output-placeholder {
  color: var(--text-secondary);
  text-align: center;
  margin-top: 60px;
  font-size: 12px;
}
.output-placeholder .big {
  font-size: 32px;
  margin-bottom: 8px;
}

/* Error */
.error-msg {
  background: rgba(255, 51, 102, 0.1);
  border: 1px solid var(--accent-red);
  border-radius: 4px;
  padding: 12px;
  color: var(--accent-red);
}

/* File load */
.file-load-input { display: none; }

/* Mono toggle */
.mono-toggle {
  font-size: 10px;
  cursor: pointer;
  color: var(--text-secondary);
  user-select: none;
}
.mono-toggle:hover { color: var(--accent-cyan); }

/* Edit source btn in conversation mode */
.edit-source-btn {
  font-size: 10px;
  color: var(--accent-yellow);
  cursor: pointer;
  display: none;
}

/* Toast */
.toast {
  position: fixed;
  bottom: 20px;
  right: 20px;
  background: var(--accent-green);
  color: var(--bg-primary);
  padding: 8px 16px;
  border-radius: 4px;
  font-size: 12px;
  font-weight: bold;
  transform: translateY(60px);
  opacity: 0;
  transition: all 0.3s;
  z-index: 999;
}
.toast.show {
  transform: translateY(0);
  opacity: 1;
}

/* Scrollbar */
::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-track { background: var(--bg-primary); }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
::-webkit-scrollbar-thumb:hover { background: var(--accent-cyan); }
</style>
</head>
<body>

<!-- TOOLBAR -->
<div class="toolbar">
  <div class="toolbar-group">
    <label>Model</label>
    <div class="model-search-wrap">
      <input type="text" id="modelSearch" placeholder="Search models..." autocomplete="off">
      <div class="model-dropdown" id="modelDropdown"></div>
    </div>
  </div>

  <div class="toolbar-group">
    <label>Mode</label>
    <div class="mode-toggle">
      <button id="modeSingle" class="active" onclick="setMode('single')">Single-Shot</button>
      <button id="modeConvo" onclick="setMode('conversation')">Conversation</button>
    </div>
  </div>

  <div class="toolbar-group">
    <label>Temp</label>
    <input type="number" id="temperature" value="0.7" min="0" max="2" step="0.1">
  </div>

  <div class="toolbar-group">
    <label>Max Tokens</label>
    <input type="number" id="maxTokens" value="4096" min="1" max="200000" step="256">
  </div>

  <div class="toolbar-group">
    <span class="sys-prompt-toggle" onclick="toggleSysPrompt()">System Prompt</span>
  </div>
</div>

<!-- System prompt panel -->
<div class="sys-prompt-panel" id="sysPromptPanel">
  <textarea id="systemPrompt" placeholder="Custom system prompt (leave empty for default)..."></textarea>
</div>

<!-- INPUT PANELS -->
<div class="panels">
  <!-- Source Text -->
  <div class="panel">
    <div class="panel-header">
      <span class="panel-title">Source Text</span>
      <div style="display:flex;gap:8px;align-items:center;">
        <span class="edit-source-btn" id="editSourceBtn" onclick="unlockSource()">Edit Source</span>
        <span class="mono-toggle" id="monoToggle" onclick="toggleMono()">Mono: ON</span>
        <label class="btn btn-small" style="cursor:pointer;" title="Load from file">
          Load File
          <input type="file" class="file-load-input" id="fileInput" accept=".txt,.md,.rtf,.html">
        </label>
      </div>
    </div>
    <textarea id="sourceText" placeholder="Paste or type source text here... a manuscript chapter, article, notes, code, etc."></textarea>
    <div class="panel-footer">
      <span class="panel-meta" id="sourceStats">0 words / 0 chars</span>
    </div>
  </div>

  <!-- Instruction -->
  <div class="panel">
    <div class="panel-header">
      <span class="panel-title">Instruction</span>
    </div>
    <textarea id="instruction" placeholder="e.g., Rewrite in first-person POV / Summarize in 3 bullets / Translate to French / Make the dialogue snappier"></textarea>
    <div class="panel-footer">
      <div style="display:flex;gap:8px;">
        <button class="btn btn-primary" id="runBtn" onclick="handleRun()">Run</button>
        <button class="btn" onclick="clearAll()">Clear</button>
      </div>
      <div class="status-bar">
        <div class="spinner" id="spinner"></div>
        <span class="elapsed" id="elapsed"></span>
      </div>
    </div>
  </div>
</div>

<!-- OUTPUT -->
<div class="output-section">
  <div class="output-header">
    <span class="output-title" id="outputTitle">Output</span>
    <div style="display:flex;gap:8px;">
      <button class="btn btn-small" id="copyBtn" onclick="copyResult()" style="display:none;">Copy</button>
      <button class="btn btn-small" id="saveBtn" onclick="saveResult()" style="display:none;">Save</button>
      <button class="btn btn-small" id="newConvoBtn" onclick="newConversation()" style="display:none;">New Conversation</button>
    </div>
  </div>
  <div class="output-body" id="outputBody">
    <div class="output-placeholder">
      <div class="big">///</div>
      Paste source text, write an instruction, and hit Run.
    </div>
  </div>
  <div class="usage-bar" id="usageBar" style="display:none;">
    <div>Prompt: <span id="usagePrompt">-</span> tokens</div>
    <div>Completion: <span id="usageCompletion">-</span> tokens</div>
    <div>Total: <span id="usageTotal">-</span></div>
    <div>Model: <span id="usageModel">-</span></div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
// ─── State ───
let mode = 'single';
let models = [];
let selectedModel = 'anthropic/claude-sonnet-4';
let conversationHistory = [];
let isRunning = false;
let elapsedTimer = null;
let lastResultText = '';
let monoOn = true;

// ─── Toolbox API ───
let Toolbox = null;

function waitForToolbox() {
  return new Promise(resolve => {
    if (window.Toolbox) { resolve(window.Toolbox); return; }
    window.addEventListener('message', function handler(e) {
      if (e.data && e.data.type === 'toolbox-ready') {
        window.removeEventListener('message', handler);
        resolve(window.Toolbox);
      }
    });
  });
}

// ─── Init ───
async function init() {
  Toolbox = await waitForToolbox();

  // Load models
  try {
    const res = await Toolbox.run({ action: 'list_models' });
    if (res.data && Array.isArray(res.data)) {
      models = res.data;
      buildModelDropdown();
    }
  } catch (e) {
    console.error('Failed to load models:', e);
  }

  // Events
  document.getElementById('sourceText').addEventListener('input', updateSourceStats);
  document.getElementById('fileInput').addEventListener('change', handleFileLoad);
  document.getElementById('modelSearch').addEventListener('input', filterModels);
  document.getElementById('modelSearch').addEventListener('focus', () => showDropdown(true));
  document.addEventListener('click', (e) => {
    if (!e.target.closest('.model-search-wrap')) showDropdown(false);
  });

  // Set default model in search box
  const defaultM = models.find(m => m.id === selectedModel);
  document.getElementById('modelSearch').value = defaultM ? defaultM.name : selectedModel;

  // Keyboard shortcut
  document.addEventListener('keydown', (e) => {
    if ((e.ctrlKey || e.metaKey) && e.key === 'Enter') {
      e.preventDefault();
      handleRun();
    }
  });
}

init();

// ─── Model selector ───
function buildModelDropdown() {
  filterModels();
}

function filterModels() {
  const query = document.getElementById('modelSearch').value.toLowerCase();
  const dd = document.getElementById('modelDropdown');
  const filtered = models.filter(m =>
    m.id.toLowerCase().includes(query) || m.name.toLowerCase().includes(query)
  ).slice(0, 80);

  dd.innerHTML = filtered.map(m => {
    const promptCost = parseFloat(m.pricing_prompt) * 1000000;
    const compCost = parseFloat(m.pricing_completion) * 1000000;
    const ctx = m.context_length ? `${(m.context_length / 1000).toFixed(0)}k` : '?';
    const price = promptCost > 0 ? `$${promptCost.toFixed(2)}/$${compCost.toFixed(2)} per M` : 'Free';
    return `<div class="model-option${m.id === selectedModel ? ' selected' : ''}" data-id="${m.id}" onclick="selectModel('${m.id}', '${m.name.replace(/'/g, "\\'")}')">
      <span>${m.name}</span>
      <span class="model-meta">${ctx} ctx | ${price}</span>
    </div>`;
  }).join('');

  showDropdown(true);
}

function showDropdown(open) {
  document.getElementById('modelDropdown').classList.toggle('open', open);
}

function selectModel(id, name) {
  selectedModel = id;
  document.getElementById('modelSearch').value = name;
  showDropdown(false);
}

// ─── Mode toggle ───
function setMode(m) {
  mode = m;
  document.getElementById('modeSingle').classList.toggle('active', m === 'single');
  document.getElementById('modeConvo').classList.toggle('active', m === 'conversation');
  document.getElementById('newConvoBtn').style.display = m === 'conversation' ? '' : 'none';

  // Update instruction placeholder
  const instr = document.getElementById('instruction');
  if (m === 'conversation') {
    instr.placeholder = conversationHistory.length > 0
      ? 'e.g., Now tighten the second paragraph / Restore the original opening'
      : 'e.g., Rewrite in first-person POV / Summarize in 3 bullets / Translate to French';
  } else {
    instr.placeholder = 'e.g., Rewrite in first-person POV / Summarize in 3 bullets / Translate to French / Make the dialogue snappier';
  }

  // Reset conversation state when switching to single
  if (m === 'single') {
    unlockSource();
    document.getElementById('editSourceBtn').style.display = 'none';
  }
}

// ─── Source text helpers ───
function updateSourceStats() {
  const text = document.getElementById('sourceText').value;
  const words = text.trim() ? text.trim().split(/\s+/).length : 0;
  const chars = text.length;
  document.getElementById('sourceStats').textContent = `${words.toLocaleString()} words / ${chars.toLocaleString()} chars`;
}

function toggleMono() {
  monoOn = !monoOn;
  const ta = document.getElementById('sourceText');
  ta.style.fontFamily = monoOn ? 'var(--font-mono)' : 'Georgia, "Times New Roman", serif';
  document.getElementById('monoToggle').textContent = `Mono: ${monoOn ? 'ON' : 'OFF'}`;
}

function handleFileLoad(e) {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = (ev) => {
    document.getElementById('sourceText').value = ev.target.result;
    updateSourceStats();
    showToast(`Loaded ${file.name}`);
  };
  reader.readAsText(file);
  e.target.value = '';
}

function lockSource() {
  document.getElementById('sourceText').classList.add('locked');
  document.getElementById('editSourceBtn').style.display = '';
}
function unlockSource() {
  document.getElementById('sourceText').classList.remove('locked');
  document.getElementById('editSourceBtn').style.display = 'none';
}

// ─── System prompt ───
function toggleSysPrompt() {
  document.getElementById('sysPromptPanel').classList.toggle('open');
}

// ─── Main run ───
async function handleRun() {
  if (isRunning || !Toolbox) return;

  const sourceText = document.getElementById('sourceText').value;
  const instruction = document.getElementById('instruction').value;

  if (!sourceText && !instruction) {
    showError('Provide source text, an instruction, or both.');
    return;
  }

  isRunning = true;
  const runBtn = document.getElementById('runBtn');
  runBtn.disabled = true;
  runBtn.textContent = 'Running...';
  document.getElementById('spinner').classList.add('active');
  startElapsed();

  const params = {
    source_text: sourceText,
    instruction: instruction,
    model: selectedModel,
    temperature: parseFloat(document.getElementById('temperature').value) || 0.7,
    max_tokens: parseInt(document.getElementById('maxTokens').value) || 4096,
    system_prompt: document.getElementById('systemPrompt').value || '',
  };

  try {
    let res;
    if (mode === 'single') {
      params.action = 'process';
      res = await Toolbox.run(params);
      handleSingleResult(res);
    } else {
      params.action = 'conversation';
      params.conversation_history = JSON.stringify(conversationHistory);
      res = await Toolbox.run(params);
      handleConversationResult(res, instruction);
    }
  } catch (e) {
    showError(`Request failed: ${e.message || e}`);
  } finally {
    isRunning = false;
    runBtn.disabled = false;
    runBtn.textContent = 'Run';
    document.getElementById('spinner').classList.remove('active');
    stopElapsed();
  }
}

function handleSingleResult(res) {
  if (res.message && res.message.startsWith('Error')) {
    showError(res.message);
    return;
  }

  const data = res.data || {};
  lastResultText = data.result_text || res.message || '';

  const body = document.getElementById('outputBody');
  body.innerHTML = `<div class="result-text">${renderMarkdown(lastResultText)}</div>`;

  showUsage(data);
  document.getElementById('copyBtn').style.display = '';
  document.getElementById('saveBtn').style.display = '';
}

function handleConversationResult(res, userInstruction) {
  if (res.message && res.message.startsWith('Error')) {
    showError(res.message);
    // Restore history from response if available
    if (res.data && res.data.conversation_history) {
      conversationHistory = JSON.parse(res.data.conversation_history);
    }
    return;
  }

  const data = res.data || {};
  lastResultText = data.result_text || '';

  // Update history
  if (data.conversation_history) {
    conversationHistory = JSON.parse(data.conversation_history);
  }

  // Lock source text after first turn
  lockSource();

  // Clear instruction for next turn
  document.getElementById('instruction').value = '';
  document.getElementById('instruction').placeholder =
    'e.g., Now tighten the second paragraph / Restore the original opening';

  // Render thread
  renderConversationThread();
  showUsage(data);
  document.getElementById('copyBtn').style.display = '';
  document.getElementById('saveBtn').style.display = '';
}

function renderConversationThread() {
  const body = document.getElementById('outputBody');
  const thread = document.createElement('div');
  thread.className = 'conversation-thread';

  // Skip system messages in display
  const visible = conversationHistory.filter(m => m.role !== 'system');

  visible.forEach((m, i) => {
    const div = document.createElement('div');
    div.className = `msg msg-${m.role}`;
    const roleLabel = m.role === 'user' ? 'You' : 'Assistant';
    // Truncate long user messages with source text in display
    let content = m.content;
    if (m.role === 'user' && content.includes('## Source Text') && content.length > 500) {
      const instrMatch = content.match(/## Instruction\n\n([\s\S]*?)\n\n## Source Text/);
      content = instrMatch
        ? `${instrMatch[1]}\n\n[Source text provided — ${content.length.toLocaleString()} chars]`
        : `[Message with source text — ${content.length.toLocaleString()} chars]`;
    }
    div.innerHTML = `
      <div class="msg-role">${roleLabel}</div>
      <div class="msg-content">${renderMarkdown(content)}</div>
      <button class="btn btn-small msg-copy" onclick="copyText(\`${escapeTemplate(m.content)}\`)">Copy</button>
    `;
    thread.appendChild(div);
  });

  body.innerHTML = '';
  body.appendChild(thread);

  // Scroll to bottom
  body.scrollTop = body.scrollHeight;
}

// ─── New conversation ───
function newConversation() {
  conversationHistory = [];
  unlockSource();
  document.getElementById('instruction').value = '';
  document.getElementById('instruction').placeholder =
    'e.g., Rewrite in first-person POV / Summarize in 3 bullets / Translate to French';
  document.getElementById('outputBody').innerHTML =
    '<div class="output-placeholder"><div class="big">///</div>Conversation cleared. Enter source text and instruction to begin.</div>';
  document.getElementById('usageBar').style.display = 'none';
  document.getElementById('copyBtn').style.display = 'none';
  document.getElementById('saveBtn').style.display = 'none';
  lastResultText = '';
}

// ─── Clear all ───
function clearAll() {
  document.getElementById('sourceText').value = '';
  document.getElementById('instruction').value = '';
  updateSourceStats();
  if (mode === 'conversation') newConversation();
}

// ─── Copy / Save ───
function copyResult() {
  if (!lastResultText) return;
  copyText(lastResultText);
}

function copyText(text) {
  navigator.clipboard.writeText(text).then(() => showToast('Copied!'));
}

async function saveResult() {
  if (!lastResultText || !Toolbox) return;
  try {
    const res = await Toolbox.run({
      action: 'save',
      result_text: lastResultText,
      model: selectedModel,
      instruction: document.getElementById('instruction').value,
    });
    if (res.files && res.files.length > 0) {
      showToast(`Saved: ${res.files[0].name}`);
    } else {
      showToast(res.message);
    }
  } catch (e) {
    showToast('Save failed');
  }
}

// ─── Usage display ───
function showUsage(data) {
  if (!data || !data.usage) return;
  const bar = document.getElementById('usageBar');
  bar.style.display = 'flex';
  const u = data.usage;
  document.getElementById('usagePrompt').textContent = (u.prompt_tokens || 0).toLocaleString();
  document.getElementById('usageCompletion').textContent = (u.completion_tokens || 0).toLocaleString();
  document.getElementById('usageTotal').textContent = ((u.prompt_tokens || 0) + (u.completion_tokens || 0)).toLocaleString();
  document.getElementById('usageModel').textContent = data.model_used || selectedModel;
}

// ─── Error display ───
function showError(msg) {
  document.getElementById('outputBody').innerHTML = `<div class="error-msg">${msg}</div>`;
}

// ─── Elapsed timer ───
function startElapsed() {
  const el = document.getElementById('elapsed');
  el.classList.add('active');
  const start = Date.now();
  elapsedTimer = setInterval(() => {
    const s = ((Date.now() - start) / 1000).toFixed(1);
    el.textContent = `${s}s`;
  }, 100);
}
function stopElapsed() {
  clearInterval(elapsedTimer);
  // Keep the final time visible for a moment, then hide
  setTimeout(() => document.getElementById('elapsed').classList.remove('active'), 3000);
}

// ─── Toast ───
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2000);
}

// ─── Simple markdown renderer ───
function renderMarkdown(text) {
  if (!text) return '';
  let html = text
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;');

  // Code blocks
  html = html.replace(/```(\w*)\n([\s\S]*?)```/g, '<pre><code>$2</code></pre>');
  // Inline code
  html = html.replace(/`([^`]+)`/g, '<code>$1</code>');
  // Headers
  html = html.replace(/^### (.+)$/gm, '<h3>$1</h3>');
  html = html.replace(/^## (.+)$/gm, '<h2>$1</h2>');
  html = html.replace(/^# (.+)$/gm, '<h1>$1</h1>');
  // Bold
  html = html.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
  // Italic
  html = html.replace(/\*(.+?)\*/g, '<em>$1</em>');
  // Lists
  html = html.replace(/^- (.+)$/gm, '<li>$1</li>');
  html = html.replace(/^(\d+)\. (.+)$/gm, '<li>$2</li>');
  // Line breaks (double newline = paragraph break)
  html = html.replace(/\n\n/g, '<br><br>');

  return html;
}

// ─── Template literal escaper ───
function escapeTemplate(str) {
  return str.replace(/\\/g, '\\\\').replace(/`/g, '\\`').replace(/\$/g, '\\$');
}
</script>
